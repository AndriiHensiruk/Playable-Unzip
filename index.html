<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Playable Unzip</title>
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
    #game { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: filter 0.5s ease-out; }
    
    #mainCanvas { 
        position: absolute; 
        top: 50%; 
        left: 50%; 
        z-index: 2; 
        will-change: transform, filter;
        transform: translate(-50%, -50%) scale(1.15);
    }

    #splash { position: absolute; inset: 0; z-index: 200; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; cursor: pointer; }
    
    #zipVisual { 
        position: absolute; 
        pointer-events: none; 
        animation: zipBlink 1s infinite ease-in-out; 
        z-index: 5;
        will-change: transform;
        object-fit: contain;
    }

   #startButton { 
        position: absolute; 
        bottom: 40%; 
        left: 50%;
        transform: translateX(-50%); 
        width: 75vw; 
        max-width: 420px; 
        z-index: 210;
        animation: pulse 1.2s infinite; 
        pointer-events: none; 
    }
    #hand { position: absolute; width: 80px; z-index: 120; pointer-events: none; display: none; opacity: 0; transition: opacity 0.5s ease-in; }

    #finalOverlay {
        position: absolute; inset: 0;
        background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 100%);
        z-index: 150; opacity: 0; pointer-events: none;
        transition: opacity 1s;
    }

    #finalCTA {
        position: absolute; 
        top: 45%; 
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        width: 85vw; 
        max-width: 450px;
        opacity: 0; 
        z-index: 300;
        display: none;
        transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
        animation: pulse 1.2s infinite; 
    }

    .confetti { position: absolute; z-index: 250; pointer-events: none; } 
    .star { position: absolute; z-index: 250; pointer-events: none; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }

    .blur-effect { filter: blur(8px); }

    @keyframes zipBlink { 0%, 100% { opacity: 0.4; filter: brightness(1) drop-shadow(0 0 5px #00ff66); } 50% { opacity: 1; filter: brightness(1.8) drop-shadow(0 0 15px #00ff66); } }
    @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.06); } }
    @keyframes pulseStart { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.06); } }
    #startButton { animation: pulseStart 1.2s infinite; }

    @keyframes handMoveUp { 0% { transform: translate(-30%, 0); opacity: 0; } 15% { opacity: 1; } 80% { transform: translate(-15%, -220px); opacity: 1; } 100% { transform: translate(-50%, -220px); opacity: 0; } }
    @keyframes confettiSwing { 0%, 100% { margin-left: -15px; } 50% { margin-left: 15px; } }

    @keyframes breathing {
        0%, 100% { transform: translate(-50%, -50.5%) scale(1.15); }
        50% { transform: translate(-50%, -49.5%) scale(1.17); } 
    }
    
    .canvas-live { animation: breathing 4s ease-in-out infinite; }
</style>
</head>
<body>

<div id="game">
    <img id="bg" src="assets/bg.webp" class="blur-effect">
    <canvas id="mainCanvas" class="blur-effect"></canvas>
    <div id="finalOverlay"></div>
    <div id="splash" onclick="initGame()">
        <img id="zipVisual" src="assets/zip_line.webp">
        <img id="startButton" src="assets/start_button.webp">
    </div>
    <img id="hand" src="assets/hand.webp">
    <img id="finalCTA" src="assets/final_cta.webp" onclick="clickAd()">
</div>

<audio id="sndBg" src="assets/bg_music.mp3" loop playsinline></audio>
<audio id="sndZip" src="assets/zip_loop.mp3" loop playsinline></audio>
<audio id="sndVoice" src="assets/voice_shout.mp3" playsinline></audio>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    const splash = document.getElementById('splash');
    const hand = document.getElementById('hand');
    const finalCTA = document.getElementById('finalCTA');
    const zipLine = document.getElementById('zipVisual');
    const finalOverlay = document.getElementById('finalOverlay');
    
    const imgOpen = new Image(); imgOpen.src = 'assets/girl_under.webp'; 
    const imgClosed = new Image(); imgClosed.src = 'assets/girl_jacket.webp'; 
    
    let progress = 0;
    let isDragging = false;
    let gameActive = false;
    let render = {};
    let lastVoiceProgress = 0;
    let isImagesLoaded = 0;

    imgOpen.onload = imgClosed.onload = () => { isImagesLoaded++; if (isImagesLoaded === 2) resize(); };

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;

        const imgRatio = 1080 / 1920; 
        const screenRatio = window.innerWidth / window.innerHeight;
        
        if (screenRatio > imgRatio) { 
            render.h = window.innerHeight; 
            render.w = render.h * imgRatio; 
        } else { 
            render.w = window.innerWidth; 
            render.h = render.w / imgRatio; 
        }
        
        render.x = (window.innerWidth - render.w) / 2; 
        render.y = (window.innerHeight - render.h) / 2;

        const zipH = 0.85;
        zipLine.style.width = render.w + 'px';
        zipLine.style.height = (render.h * zipH) + 'px';
        zipLine.style.left = render.x + 'px';
        zipLine.style.top = (render.y + (render.h * (1 - zipH) / 2)) + 'px';
        zipLine.style.transform = 'scale(1.25)';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
    }

    function draw() {
        if (!render.w) return;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        ctx.drawImage(imgOpen, render.x, render.y, render.w, render.h);
        
        tempCtx.save();
        const dpr = window.devicePixelRatio || 1;
        tempCanvas.width = window.innerWidth * dpr;
        tempCanvas.height = window.innerHeight * dpr;
        tempCtx.scale(dpr, dpr);
        
        tempCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        tempCtx.drawImage(imgClosed, render.x, render.y, render.w, render.h);
        
        const revealY = (render.y + render.h * 0.85) - (progress * render.h * 0.7);
        const fadeHeight = 50;

        tempCtx.globalCompositeOperation = 'destination-out';
        const grad = tempCtx.createLinearGradient(0, revealY - fadeHeight, 0, revealY);
        grad.addColorStop(0, 'rgba(0,0,0,0)'); 
        grad.addColorStop(1, 'rgba(0,0,0,1)');
        tempCtx.fillStyle = grad;
        tempCtx.fillRect(render.x, revealY - fadeHeight, render.w, window.innerHeight - (revealY - fadeHeight));
        tempCtx.restore();

        ctx.drawImage(tempCanvas, 0, 0, window.innerWidth * dpr, window.innerHeight * dpr, 0, 0, window.innerWidth, window.innerHeight);
    }

    function initGame() {
        if (gameActive) return;
        gameActive = true;
        
        document.getElementById('bg').classList.remove('blur-effect');
        canvas.classList.remove('blur-effect');
        
        document.getElementById('sndBg').play().catch(()=>{});
        sndBg.volume = 0.3;
        canvas.style.transition = 'transform 0.5s ease-in-out, filter 0.5s ease-out';
        canvas.classList.add('canvas-live');
        zipLine.classList.add('canvas-live');

        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            hand.style.display = 'block';
            hand.style.left = '50%';
            hand.style.top = (render.y + render.h * 0.82) + 'px';
            hand.style.animation = 'handMoveUp 2s infinite ease-in-out';
            setTimeout(() => { hand.style.opacity = '1'; }, 100);
        }, 500);
    }

    window.addEventListener('pointerdown', (e) => {
        if (!gameActive || progress >= 1) return;
        isDragging = true;
        hand.style.display = 'none';
        document.getElementById('sndZip').play().catch(()=>{});
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const bottomY = render.y + render.h * 0.85;
        const currentY = e.clientY;
        let p = (bottomY - currentY) / (render.h * 0.7);
        progress = Math.max(0, Math.min(p, 1));
        
        if (progress > lastVoiceProgress + 0.25) {
            lastVoiceProgress += 0.25;
            const v = document.getElementById('sndVoice');
            v.currentTime = 0; v.play().catch(()=>{});
        }
        
        draw();
        if (progress >= 0.92) finish();
    });

    window.addEventListener('pointerup', () => { 
        isDragging = false; 
        document.getElementById('sndZip').pause(); 
    });

    function finish() {
        if (finalCTA.style.display === 'block') return;
        gameActive = false;
        isDragging = false;
        progress = 1;
        draw();

        canvas.classList.remove('canvas-live');
        zipLine.classList.remove('canvas-live');
        canvas.style.transform = 'translate(-50%, -50%) scale(1.15)'; 

        finalOverlay.style.opacity = '1';
        createStars();
        spawnConfetti();

        finalCTA.style.display = 'block';
        setTimeout(() => {
            finalCTA.style.opacity = '1';
            finalCTA.style.transform = 'translate(-50%, -50%) scale(1)';
        }, 50);
    }

    function spawnConfetti() {
        const colors = ['#ff0', '#f0f', '#0ff', '#f00', '#fff', '#ffd700', '#00ff66', '#ff9900'];
        for (let i = 0; i < 80; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.width = (Math.random() * 8 + 4) + 'px';
            c.style.height = (Math.random() * 4 + 2) + 'px';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-20px';
            c.style.animation = `confettiSwing ${Math.random() * 2 + 1}s infinite ease-in-out`;
            document.body.appendChild(c);
            c.animate([
                { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(110vh) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
            ], { duration: 3000 + Math.random() * 2000, easing: 'linear' });
            setTimeout(() => c.remove(), 5000);
        }
    }

    function createStars() {
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = 15 + Math.random() * 15;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = '50%'; s.style.top = '50%';
            document.body.appendChild(s);
            const a = Math.random() * Math.PI * 2;
            const d = 100 + Math.random() * 400;
            s.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.cos(a)*d)}px, ${(Math.sin(a)*d)}px) scale(0)`, opacity: 0 }
            ], { duration: 1200, easing: 'ease-out' });
            setTimeout(() => s.remove(), 1200);
        }
    }

    function clickAd() { window.location.href = 'https://honeytoon.com/comic-video/teach-me-first?n=1'; }
    window.addEventListener('resize', resize);
</script>
</body>
</html>
